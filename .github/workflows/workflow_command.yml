name: Workflow Commands

on:
  [push]

jobs:
  workflow-commands:
    runs-on: ubuntu-latest
    steps:
      - name: group logging
        run: |
          echo "::group:: My grouped messages"
          echo "Msg1"
          echo "Msg2"
          echo "::endgroup::"
      - name: Step 1
        run: echo MY_VAL=Hello >> $GITHUB_ENV
      - name: Step 2
        run: echo $MY_VAL
